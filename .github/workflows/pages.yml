name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html
          test -d dist/assets
          test -f dist/.nojekyll
          ls -la dist

      - name: Publish dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy with GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  configure-branch-source:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Try to configure repository Pages source
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -e
          BODY='{"source":{"branch":"gh-pages","path":"/"}}'
          STATUS=$(curl -s -o /tmp/pages_response.json -w "%{http_code}" \
            -L \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/pages" \
            -d "$BODY")

          if [ "$STATUS" = "404" ]; then
            STATUS=$(curl -s -o /tmp/pages_response.json -w "%{http_code}" \
              -L \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/pages" \
              -d "$BODY")
          fi

          cat /tmp/pages_response.json
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Unable to configure Pages source automatically."
            echo "If the site is blank, set Settings > Pages > Source to GitHub Actions or gh-pages / root."
            exit 1
          fi
